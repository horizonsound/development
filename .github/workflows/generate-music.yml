name: Generate Music YAML

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-music:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./youtube-sync

      - name: Generate music.yml
        run: node generate_music.js
        working-directory: ./youtube-sync

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add _data/music.yml || true
          git commit -m "Generated music.yml" || echo "No changes to commit"
          git push || echo "No changes to push"

