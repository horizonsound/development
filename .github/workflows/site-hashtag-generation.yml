name: Site Hashtag Generation

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tag generation mode"
        required: true
        type: choice
        options:
          - only-empty
          - full-regen
        default: only-empty

  push:
    paths:
      - "_data/youtube_feed.yml"
      - "youtube-sync/site-hashtag-generation.js"
      - "youtube-sync/utils/**"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: youtube-sync

      - name: Generate hashtags
        run: |
          if [ "${{ github.event.inputs.mode }}" = "full-regen" ]; then
            echo "Running in FULL REGEN mode"
            node site-hashtag-generation.js --all
          else
            echo "Running in ONLY EMPTY TAGS mode"
            node site-hashtag-generation.js
          fi
        working-directory: youtube-sync

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: regenerated hashtags"
          file_pattern: "_data/youtube_feed.yml"
