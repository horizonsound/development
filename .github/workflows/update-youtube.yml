name: Update YouTube Metadata

on:
  workflow_dispatch:   # manual trigger
  push:
    branches:
      - metadata       # optional: run when pushing to metadata branch

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run metadata update
        run: node scripts/update-youtube.js

      - name: Commit changes
        run: |
          git config user.name "Horizon Bot"
          git config user.email "bot@horizonsound.com"
          git add _data/youtube_feed.yml
          git commit -m "Update YouTube metadata" || echo "No changes to commit"

      - name: Push changes
        run: git push
