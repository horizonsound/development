name: YouTube Metadata Mirror

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: youtube-sync

      - name: Fetch YouTube metadata (mirror)
        run: node fetch-youtube-metadata-mirror.js
        working-directory: youtube-sync

      - name: Commit and push metadata mirror
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update: refreshed YouTube metadata mirror"
          file_pattern: "_data/youtube_metadata.yml"
