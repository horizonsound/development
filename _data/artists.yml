    headshot: ./assets/artists/lucas-allen/lucas-allen.jpg
    bio:
      - Lucas Allen is a modern country storyteller with a warm, lived‑in voice and a grounded, everyman charm.
      - His music blends contemporary country, Americana grit, and cinematic small‑town imagery — honest, melodic, and deeply human.
      - He writes about long drives, late nights, heartbreak, hope, and the moments that shape who we become.
      - Within Horizon Sound, Lucas anchors the Modern Country lane — heartfelt, relatable, and rich with narrative detail.
      - Contact Lucas at Lucas.Allen@HorizonSound.org
