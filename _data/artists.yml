    headshot: ./assets/artists/ravyn/Ravyn Headshot 1024x1024.jpg
    bio:
      - Ravyn is an unpredictable pop artist with a wild heart and a taste for the edge.
      - Her sound blends emotional pop, rebellious energy, and a spark of beautiful chaos — always bold, always alive.
      - She writes about risk, desire, impulsive choices, and the moments where confidence and vulnerability collide.
      - Within Horizon Sound, Ravyn stands as the fearless experimenter — equally at home in dark, cinematic eras like Midnight Saga or in bright, high‑energy pop built for movement and release.
      - Contact Ravyn at Ravyn@HorizonSound.org
