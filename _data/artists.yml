artists:
  - slug: ascension-youth-choir
    name:
      full: Ascension Youth Choir
      first:
      last:
      initials: ayc
    tagline: Voices rising with purpose, unity, and heart
    primary_color: "#2A4C8F"
    secondary_color: "#E8EAF3"
    headshot: ./assets/artists/ascension-youth-choir/AYC6.jpg
    bio: 
      - Ascension Youth Choir is a vibrant ensemble of young singers ages eight to fifteen, united by a shared love of music and a spirit of encouragement. Because of this age range, the choir is always evolving, wonderful singers grow up and move on, and new voices step in to carry the sound forward. Together, they keep the spirit of Ascension Youth Choir alive from season to season.
      - Known for their warm harmonies, expressive performances, and genuine connection with one another, the choir brings an uplifting energy to every stage they step onto. Whether they are rehearsing in a sunlit room, laughing between takes, or delivering a heartfelt performance, the members of Ascension Youth Choir embody the joy and authenticity of youth. Their sound blends innocence with emerging confidence, creating a unique musical identity that feels both grounded and full of possibility.
      - As part of the Horizon Sound family, the choir represents growth, community, and the belief that every young voice has something meaningful to offer. Their performances celebrate unity, diversity, and the simple power of singing together.
      - Contact Ascension Youth Choir at AYC@HorizonSound.org
