  - slug: ellie-hale
    name:
      full: Ellie Hale
      first: Ellie
      last: Hale
      initials: eh
    tagline: Dream‑lit indie pop with a soft, shimmering edge
    primary_color: "#D8A7FF"
    secondary_color: "#4A3C8C"
    headshot: ./assets/artists/ellie-hale/ellie-hale.jpg
    bio:
      - Ellie Hale is a heartfelt indie‑pop storyteller with a dreamy, shimmering vocal style and a quietly powerful emotional core.
      - Her music blends soft synth‑pop, intimate acoustic textures, and warm, cinematic production — always honest, melodic, and deeply human.
      - She writes about longing, healing, late‑night thoughts, and the fragile moments that shape who we become.
      - Within Horizon Sound, Ellie anchors the Dream‑Pop / Indie‑Pop lane — atmospheric, vulnerable, and emotionally resonant.
      - Contact Ellie at Ellie.Hale@HorizonSound.org
