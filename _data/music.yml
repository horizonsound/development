    description_html: >-
      <p>“Rise Like Thunder” is an electrifying 1980s‑inspired rock anthem
      featuring powerful raspy female vocals, soaring harmonies, and driving
      overdriven guitars. Bright melodic riffs, big arena drums with gated
      reverb, and bold analog production create a high‑energy, triumphant sound
      that feels straight out of a classic stadium performance.</p>

      <p>The song captures the rise from obscurity to the spotlight — the grind,
      the fire, the loyalty, and the unshakable belief that music can turn
      small‑town dreams into something bigger than life. With its explosive
      chorus and fierce attitude, “Rise Like Thunder” celebrates the moment when
      passion, persistence, and raw talent collide. It’s loud, proud, and built
      to be sung at full volume.</p>
    lyrics_html: |
      <p>[VERSE 1]
      Neon turned to headlines overnight,
      One spark lighting up a restless crowd.
      We kept our hearts steady through the noise and the rush,
      Never letting all the praise get loud.
      Every open door felt wild and new,
      But we held on tight to the fire we knew.</p>
      <p>[PRE‑CHORUS]
      We felt the ground start shaking under our feet,
      A rumble turning into a wildfire beat…</p>
      <p>[CHORUS]
      We rise like thunder—coming in hot,
      Hearts on fire with everything we’ve got.
      From the back‑room shadows to the front‑row lights,
      We’re the spark that explodes into glory tonight.
      Oh, we rise—yeah, we rise like thunder.</p>
      <p>[VERSE 2]
      Radio caught us on a midnight spin,
      Rolling through the dark of a world gone cold.
      One song climbing like a runaway train,
      Every note we played turned into gold.
      But we kept our boots on solid ground,
      Still the same wild hearts the world sees now.</p>
      <p>[PRE‑CHORUS]
      The crowd got louder, but we stayed true,
      Still the same wild souls we always knew…</p>
      <p>[CHORUS]
      We rise like thunder—coming in hot,
      Hearts on fire with everything we’ve got.
      From the back‑room shadows to the front‑row lights,
      We’re the spark that explodes into glory tonight.
      Oh, we rise—yeah, we rise like thunder.</p>
      <p>[BRIDGE]
      Hands up, hear the roar—
      This is what we’re fighting for.
      Every voice, every night,
      Turns our spark into a sky full of light.
      We remember where we came from—always will…
      But damn, this dream is real.</p>
      <p>[VERSE 3]
      Now it’s stadium lights and a sea of flame,
      Crowds singing every song we wrote.
      Still feel that first chord shaking our bones,
      Still feel the fire rising in our throats.
      From the small‑town nights to the world so wide,
      We carry every small‑town dream inside.</p>
      <p>[PRE‑CHORUS]
      The louder it gets, the more we know—
      This is love, this is home, this is rock‑and‑roll…</p>
      <p>[CHORUS]
      We rise like thunder—coming in hot,
      Hearts on fire with everything we’ve got.
      From the back‑room shadows to the front‑row lights,
      We’re the spark that explodes into glory tonight.
      Oh, we rise—yeah, we rise like thunder.
      And the world sings our name tonight.</p>
      <p>[OUTRO]
      Still the same hearts… still the same fire…
      Just louder now… higher now…
      We rise like thunder…</p>
