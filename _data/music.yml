    moods:
      - emotional
      - reflective
    description_html: >-
      <p>“Bottle on the Table” is a classic 1950s country‑western ballad steeped
      in heartbreak, dusty barroom atmosphere, and old‑school storytelling.
      Recorded in a warm mono style with tube‑mic character, light tape hiss,
      and a dry room sound, the track captures the raw simplicity of early
      country. A baritone male vocal leads the way with a weary, lived‑in tone,
      supported by gentle cowboy‑strum rhythm guitar, mournful steel guitar,
      upright bass, and a slow western‑swing pulse. The production leans fully
      into the Hank Williams / Marty Robbins era — no modern polish, just pure
      vintage emotion.</p>

      <p>This song tells the story of a man left behind by the woman he loved —
      and betrayed by the friend she rode away with. Alone with a bottle, a
      jukebox, and the echo of memories he can’t outrun, he tries to drown the
      hurt in whiskey and worn‑out songs. With its stark imagery, aching
      delivery, and timeless country sorrow, “Bottle on the Table” feels like a
      lost classic pulled straight from a 1950s honky‑tonk.</p>
    lyrics_html: >
      <p>[Verse 1]

      I came home from the rail yard, the daylight nearly gone,

      Found our rings on the table, and the truth hit hard and strong.

      She said she needed someone, said she couldn’t still be mine,

      Then she rode off with my best friend, and left my broken heart
      behind.</p>

      <p>[Chorus]

      Now there’s a bottle on the table and her shadow on the wall,

      And the jukebox keeps on playin’ my baby’s favorite song.

      She took my heart and left me where the broken‑hearted dwell,

      Now I’m sittin’ here with whiskey tryin’ to drown her memory.

      And the truth keeps sinkin’ deeper every time that bottle falls.</p>

      <p>[Verse 2]

      We used to dance on Fridays when the band would start to play,

      But her eyes lit up and wandered when his shadow crossed the floor.

      I gave her all my wages, every dream I ever planned,

      But she traded love for comfort in another cowboy’s hands.</p>

      <p>[Chorus]

      Now there’s a bottle on the table and her shadow on the wall,

      And the jukebox keeps on playin’ my baby’s favorite song.

      She took my heart and left me where the broken‑hearted dwell,

      Now I’m sittin’ here with whiskey tryin’ to drown her memory.

      And the nights keep gettin’ longer when you’re livin’ with regret.</p>

      <p>[Bridge]

      The night wind keeps on whisperin’ through this shack I call a home,

      And every time it calls her name, it cuts me to the bone.

      I ain’t lookin’ for no mercy, ain’t expectin’ to be saved,

      Just a man with too much memory and a love he couldn’t keep.</p>

      <p>[Final Chorus]

      Now there’s a bottle on the table and her shadow on the wall,

      And the jukebox keeps on playin’ my baby’s favorite song.

      She took my heart and left me where the broken‑hearted dwell,

      Now I’m sittin’ here with whiskey tryin’ to drown her memory.

      And the memories keep on callin’, but I’m learning to let go.</p>

      <p>[Outro]

      So I’ll finish up this whiskey while the jukebox softly plays,

      ’Cause a broken heart keeps hurtin’ long after love has walked away.</p>
