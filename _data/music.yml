  - id: trk_sherifffor_hs
    slug: sheriff_for_a_night
    title: Sheriff for a Night
    subtitle: null
    status: public
    type: null
    track_number: null
    disc_number: null
    release_id: null
    primary_artist: art_horizonsound
    featuring_artists: []
    duration: PT2M39S
    isrc: null
    genres:
      primary: null
      secondary: null
      tertiary: null
    moods:
      - warm
      - nostalgic
      - cinematic
    description_html: >-
      <p>“Sheriff for a Night” is a playful, vintage‑inspired 1950s Western tune
      built on twangy guitars, upright bass, brushed drums, and a warm baritone
      vocal. Blending classic cowboy storytelling with a comedic tall‑tale
      twist, the track captures the dusty charm of old frontier towns and the
      accidental legends born in them. With its swinging rhythm, cinematic
      atmosphere, and nostalgic production, the song feels like a lost scene
      from a golden‑age Western film.</p>

      <p>This song tells the story of a drifter who rides into Red Rock City
      looking for nothing more than a warm meal and a place to rest — only to be
      thrown into chaos when the mayor slaps a sheriff’s star on him for one
      wild night. From breaking up bar fights to corralling drunks and staring
      down bandits, he somehow stumbles his way into saving the town. Now, every
      time he passes through, the locals cheer like he’s a hero… even though he
      swears he didn’t do a thing. “Sheriff for a Night” is a fun, cinematic
      tribute to the legends small towns love to tell.</p>
    lyrics_html: |
      <p>[Verse 1]
      I rode into Red Rock City
      just to rest my weary bones.
      Didn’t plan on stayin’ long,
      just a bed and somethin’ warm to eat.
      But a fight broke out at sundown,
      folks were runnin’ left and right,
      and the mayor pointed straight at me
      and said, “Son, you’re on tonight.”</p>
      <p>[Chorus]
      I was sheriff for a night,
      wearin’ that silver star.
      Didn’t know the rules or nothin’,
      barely made it out the bar.
      But the folks in Red Rock City
      swear I saved the whole dang town —
      Now they tell the tale forever
      ’bout the sheriff for a night.</p>
      <p>[Verse 2]
      I broke up two old cowpokes
      arguin’ over cards and pride.
      Told a bandit with a pistol
      he should take it back outside.
      Locked a drunk inside the stable
      ’til he sobered up at dawn,
      and when the sun came creepin’ in,
      my borrowed badge was gone.</p>
      <p>[Chorus]
      I was sheriff for a night,
      wearin’ that silver star.
      Didn’t know the rules or nothin’,
      barely made it out the bar.
      But the folks in Red Rock City
      swear I saved the whole dang town —
      Now they tell the tale forever
      ’bout the sheriff for a night.</p>
      <p>[Bridge]
      Now every time I ride back through,
      they cheer like I’m a king.
      I just tip my hat and laugh,
      ’cause I never did a thing.</p>
      <p>[Chorus]
      I was sheriff for a night,
      just a cowboy passin’ through.
      Didn’t mean to be a hero,
      but they say I saw ’em through.
      And the folks in Red Rock City
      still retell it with delight —
      How a drifter saved the town
      as the sheriff for a night.</p>
