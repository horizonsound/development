      chorus lifts into a confident stride — the feeling of crossing a
      threshold, leaving the familiar behind, and letting the night pull you
      forward. “Before Midnight” sets the emotional foundation for the journey
      ahead, where curiosity becomes momentum and momentum becomes mayhem.</p>
    lyrics_html: |
      <p>[Intro]
