    description_html: >-
      <p>“Rusty” is an emotional 80s‑inspired pop ballad built on warm
      shimmering synth pads, bright chorus‑soaked guitars, and a steady,
      heartbeat‑like drum pulse. Soaring female vocals carry a hopeful,
      nostalgic tone, wrapped in lush reverb and airy harmonies that create a
      glowing, sunset‑on‑the‑beach atmosphere. The track blends bittersweet
      reflection with uplifting warmth, rising into a smooth, dreamy chorus that
      feels both intimate and cinematic.</p>

      <p>This song tells the story of someone who finds unexpected healing
      through the smallest companion — a soft, gentle friend who brings light
      back into her life. In the quiet moments, she rediscovers joy, laughter,
      and the version of herself she thought she’d lost. “Rusty” captures the
      tender transformation that happens when love arrives in an unexpected
      form, reminding her she’s stronger, softer, and more alive than she
      realized.</p>
    lyrics_html: |
      <p>[Verse 1]
      I was drifting through the days, barely holding on,
      Lost inside the quiet where nights felt way too long.
      Every sunrise felt a lifetime away,
      Till a soft little friend found me one bright day.</p>
      <p>[Pre‑Chorus]
      I didn’t know I needed something gentle, something true,
      A reason just to wake up, something warm to pull me through.</p>
      <p>[Chorus]
      And Rusty, you were light in the dark,
      A tiny spark that found my heart.
      You gave me something I could hold,
      A little hope when life felt cold.
      You were soft as the dawn,
      A steady place to lean upon.
      You helped me find the girl I’d lost inside —
      You brought me back to life.</p>
      <p>[Verse 2]
      Sunlight on the carpet, lighting up your fur,
      Funny how the smallest things make the whole world right.
      I started laughing more, living in the joy,
      You were small, but you showed me the way.</p>
      <p>[Pre‑Chorus]
      You taught me how to slow down, how to feel the world again,
      How healing starts in quiet with a soft and steady friend.</p>
      <p>[Chorus]
      And Rusty, you were light in the dark,
      A tiny spark that found my heart.
      You gave me something I could hold,
      A little hope when life felt cold.
      You were soft as the dawn,
      A steady place to lean upon.
      You helped me find the girl I’d lost inside —
      You brought me back to life.</p>
      <p>[Bridge]
      Maybe love can look like something small,
      A tiny heartbeat in my arms.
      You showed me I was stronger than I knew,
      And somehow loving you helped me love me too.</p>
      <p>[Chorus]
      And Rusty, you were light in the dark,
      A tiny spark that found my heart.
      You gave me something I could hold,
      A little hope when life felt cold.
      You were soft as the dawn,
