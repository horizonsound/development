    moods:
      - emotional
      - reflective
    description_html: >-
      <p>“Already Out the Door” is a modern country heartbreak story built on
      warm acoustic guitars, steady mid‑tempo drums, and clean Nashville‑style
      electric fills. An emotional male lead vocal carries the song with
      sincerity and restraint, avoiding exaggerated twang while leaning into a
      wounded, reflective tone. Smooth harmonies bloom only in the chorus,
      adding lift without overshadowing the intimacy of the verses. The
      production is polished, spacious, and subtly atmospheric, letting the
      storytelling take center stage.</p>

      <p>This song captures the quiet devastation of realizing trust is gone —
      the late‑night waiting, the phone location that tells the truth, and the
      moment a relationship breaks without a single raised voice. Honest,
      grounded, and deeply human, “Already Out the Door” is a modern country
      confession for anyone who’s stayed too long, hoped too hard, and finally
      walked away with nothing left to give.</p>
    lyrics_html: |
      <p>[Verse 1]
      You said you were out with the girls,
      but your dot never left his street.
      I waited up hopin’ I was wrong,
      but the map don’t lie…
      the way you lied to me.</p>
      <p>[Pre‑Chorus]
      You’ve said "baby, I swear" so many times,
      you made the truth into somethin’ I don’t recognize.</p>
      <p>[Chorus]
      You say you’re tellin’ the truth,
      but I’ve heard that line before.
      Your phone said you were with him,
      while I sat here waiting by the door.
      Maybe you mean it tonight…
      but I can’t trust you anymore.
      It hurts when the proof shows up
      in all the places you tried to hide.
      Yeah, maybe you’re honest tonight…
      but I’m already out the door.</p>
      <p>[Verse 2]
      I remember when your word meant somethin’,
      back before the cracks started showin’ through.
      Now every promise feels borrowed,
      and every answer sounds rehearsed instead of true.
      You say tonight you’re bein’ honest,
      but I heard that tremble in your voice.
      And even if you’re tellin’ the truth right now,
      I just can’t believe you anymore.</p>
      <p>[Pre‑Chorus]
      I’ve heard every promise you’ve ever made,
      and every one just fades a little more with every word you speak.</p>
      <p>[Chorus]
      You say you’re tellin’ the truth,
      but I’ve heard that line before.
      Your phone said you were with him,
      while I sat here waiting by the door.
      Maybe you mean it tonight…
      but I can’t trust you anymore.
      It hurts when the proof shows up
      in all the places you tried to hide.
      Yeah, maybe you’re honest tonight…
      but I’m already out the door.</p>
      <p>[Verse 3]
      I’m standin’ here lookin’ at you
      and I wish I felt somethin’ break inside.
      But all the hurt already happened
      and all the tears already dried.
      You say tonight you’re tellin’ the truth,
      and maybe for once that’s not wrong.
      But trust don’t heal up overnight,
      and mine’s been gone for far too long.</p>
      <p>[Bridge]
      I shouldn’t have to check a map
      to know where you’ve been.
      If I can’t trust what you say,
      how could we ever make this right?</p>
      <p>[Chorus]
      You say you’re tellin’ the truth,
      but I’ve heard that line before.
      Your phone said you were with him,
      while I sat here waiting by the door.
      Maybe you mean it tonight…
      but I can’t trust you anymore.
      It hurts when the proof shows up
      in all the places you tried to hide.
      Yeah, maybe you’re honest tonight…
      but I’m already out the door.</p>
      <p>[Outro]
      I’m already out the door.
