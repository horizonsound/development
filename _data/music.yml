    description_html: >-
      <p>“New Again” is a high‑energy 90s‑inspired pop track driven by strong
      female vocals, pulsing rhythm, and a bold emotional edge. Bright synths,
      tight drums, and a confident melodic lift give the song its throwback
      punch, while modern pop production keeps everything crisp and cinematic.
      The verses carry a raw, sad honesty, building into a powerful,
      self‑reclaiming chorus that feels both nostalgic and fiercely new.</p>

      <p>This song follows the story of someone finally breaking free from a
      love that kept letting her down. After one heartbreak too many, she
      rebuilds herself piece by piece — foundation, eyes, lips — transforming
      the mirror moment into a declaration of strength. A friend who always saw
      her worth steps forward, showing her the kind of love she deserved all
      along. With a soaring 90s‑pop chorus and a triumphant bridge, “New Again”
      captures the moment she chooses herself, steps into her power, and refuses
      to look back.</p>
    lyrics_html: |
      <p>[Verse]
      You let me down again,
      I thought you were the one.
      You swore I was your only,
      But now I see I wasn’t.
      I thought you’d make it right,
      But you just let it slide.
      So here I am again tonight,
      Staring at the mirror like it’s asking why.</p>
      <p>[Chorus]
      So—
      I take my time with my foundation
      Darken up my eyes and fill in my lips
      In a few minutes
      I'll be someone new again
      I'll be new again
      And you won’t recognize the girl you missed.</p>
      <p>[Verse 2]
      I step outside, the air feels clean,
      A new car waits like in a dream.
      He’s always seen me through the haze,
      Now he’s here to take me far away.
      He treats me like I’m worth the fight,
      Not just a name you said at night.
      And all this time I thought he’d stay
      Just a friend — but not today.</p>
      <p>[Chorus]
      So—
      I take my time with my foundation
      Darken up my eyes and fill in my lips
      In a few minutes
      I'll be someone new again
      I'll be new again
      And you won’t recognize the girl you missed.</p>
      <p>[Bridge]
      Now I’m new again,
      Not broken, not pretend.
      I found the strength you never saw,
      And I’m not coming back again.</p>
      <p>[Chorus]
      I take my time with my foundation
      Darken up my eyes and fill in my lips
      In a few minutes
      I'll be someone new again
      I'll be new again
      And you won’t recognize the girl you missed.</p>
      <p>[Outro]
      Now I'm new again
      (Now I'm new again)
      Now I'm new again
      (Now I'm new again)
      Now I'm new again
      (Now I'm new again)
      Now I’m new again… and I won’t be yours again.</p>
