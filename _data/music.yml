    description_html: >-
      <p>“Barroom Brawl” is a gritty, high‑energy Southern rock track packed
      with swaggering guitars, driving drums, and cinematic outlaw tension.
      Blues‑drenched riffs and raw, attitude‑driven vocals give the song its
      barroom bite, while modern production keeps the chaos crisp and immersive.
      The verses unfold like a dive‑bar memory — broken glass, raised fists, and
      a love story forged in the middle of a fight.</p>

      <p>This song tells the story of two people who meet in the heat of a
      barroom brawl — not as enemies, but as kindred spirits. Amid the chaos,
      they lock eyes and find something deeper than the noise: a shared
      defiance, a spark of connection, and the kind of love that doesn’t flinch.
      With a stomping Southern‑fried chorus and a cinematic bridge, “Barroom
      Brawl” captures the moment where grit meets grace, and something wild
      turns into something real.</p>

      <p>🎸 Vibe: Southern rock, gritty, high‑energy, cinematic</p>
    lyrics_html: |
      <p>[Intro]
      (Spoken, low and cocky)
      I swear I walked in for one damn beer…
      But I always find a way to turn “just one”
      into “Lord, not this again.”
      Guitars hit.
      Drums stomp.
      Barroom lights flicker.</p>
      <p>[Verse 1]
      I ain’t lookin’ for trouble,
      but trouble finds me anyway.
      Soon as I step through the door,
      every head turns my way.
      Bouncer groans, and says,
      “Man, not tonight…”
      One shot turns to three shots,
      and my mouth starts pickin’ fights.</p>
      <p>[Pre Chorus]
      ‘Cause someone heard me talkin’,
      and they didn’t like the sound.
      Stools start slidin’ backward,
      and the room starts gatherin’ ’round.</p>
      <p>[Chorus]
      Met you in the middle of a barroom brawl,
      Dodgin’ fists and breakin’ falls—
      If that ain’t love, hell, I don’t know what is.
      You laughed like hell and said,
      “Boy, you call this flirting?”
      Right there in the smoke and broken glass,
      you stole my breath with that “here we go” grin—
      If that ain’t love in all this mess,
      Hell, I don’t know what is.</p>
      <p>[Verse 2]
      Bouncer tossed us out the door,
      bleedin’ but alive.
      She laughed and said, “You swing wild, boy,
      and damn, you sure take a punch.”
      She pressed ice against her knuckles,
      I wiped blood off my chin—
      Right there on that sidewalk,
      I swear my heart gave in.</p>
      <p>[Pre Chorus]
      ’Cause she’s tougher than the whiskey,
      and sweeter than sin—
      Lord help me, I’m in trouble,
      and I kinda hope I am.</p>
      <p>[Chorus]
      Met you in the middle of a barroom brawl,
      Dodgin’ fists and breakin’ falls—
      If that ain’t love, hell, I don’t know what is.
      You laughed like hell and said,
      “Boy, you call this flirting?”
      Right there in the smoke and broken glass,
      you stole my breath with that “here we go” grin—
      If that ain’t love in all this mess,
      Hell, I don’t know what is.</p>
      <p>[Bridge]
      Darlin’, I been swingin’ wild
      since I was just a child—
      but for you I’ll hang my fists up,
      try to rise above it all.
      No more whiskey‑mouth disasters,
      no more bleedin’ knuckles—
      I’ll be a better man…</p>
      <p>[Chorus]
      Met you in the middle of a barroom brawl,
      Dodgin’ fists and breakin’ falls—
      If that ain’t love, hell, I don’t know what is.
      You laughed like hell and said,
      “Boy, you call this flirting?”
      Right there in the smoke and broken glass,
      you stole my breath with that “here we go” grin—
      If that ain’t love in all this mess,
      Hell, I don’t know what is.</p>
      <p>[Outro]
      I’m swingin’ in another bar,
      another Friday, same old mess.
      Looked around to find my darlin’—
      she weren’t watchin’ me, I guess.
      She was leanin’ on the jukebox,
      smilin’ at some other fool,
      ’cause she didn’t want a changed man—
      she wanted someone—
      still breaking all the rules.</p>
