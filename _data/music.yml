      We’re making midnight mayhem, watch the whole world shake,
      Every move we’re making leaves a glitter quake.
      Lights go wild when we hit the floor —
      One scream, one beat — now they’re begging for more.
      We’re reckless, restless, ready to blow,
      Turn the night up louder, let the chaos flow.</p>
