      <p>“Midnight Mayhem” explodes into the second chapter of The Midnight Saga
      with high‑energy pop, pulsing rhythm, and neon‑drenched chaos. Bright
      synths, sharp drums, and bold female vocals collide in a track that
      captures the moment the night stops behaving — when everything gets
      louder, faster, and wildly unpredictable. It’s the sound of losing control
      in the best possible way.</p>

      <p>This chapter follows the rush of stepping deeper into the night’s
      frenzy. The verses spark with reckless excitement, while the chorus hits
      like a burst of adrenaline — the kind that makes you laugh, run, dance,
      and forget the world outside the moment. “Midnight Mayhem” is the turning
      point where curiosity becomes chaos, and the night reveals its wildest
      side.</p>
    lyrics_html: |
      <p>[Intro]
      Let the chaos flow.</p>
      <p>[Verse 1]
      Neon dripping off my body like a cosmic waterfall,
      I walk in and every heel click starts a riot in the hall.
      Got confetti in my lashes, got a dare behind my grin,
      If you’re looking for a quiet night—
      don’t let me in.
      I’m a spark in a powder room, a queen about to blow,
      And the second that the bass hits, I’m electric to the bone.</p>
      <p>[Pre‑Chorus]
      Turn it up ’til the walls start bending,
      We don’t stop — we just keep ascending.
      Hands in the air like we’re touching the sky,
      This whole place ’bout to amplify.</p>
      <p>[Chorus]
      We’re making midnight mayhem, watch the whole world shake,
      Every move we’re making leaves a glitter quake.
      Lights go wild when we hit the floor —
      One scream, one beat — now they’re begging for more.
      We’re reckless, restless, ready to blow,
      Turn the night up louder, let the chaos flow</p>
      <p>[Verse 2]
      Silver lipstick on a stranger, girlfriends dancing on the bar,
      I’m a hurricane in heels and I’m a wish upon a star.
      Got a pocket full of trouble and a rhythm in my veins,
      Every step I take is thunder—
      I won’t be contained.
      If you’re craving something dangerous, then baby, here I am —
      A firework in human form, a one girl traffic jam.</p>
      <p>[Pre‑Chorus]
      Turn it up ’til the room starts spinning,
      We’re not losing — insane is winning.
      Bodies collide like a sensual tide,
      We’re the storm they can’t survive.</p>
