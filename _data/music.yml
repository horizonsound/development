    description_html: >-
      <p>“Ghostlight” is a haunting, theatrical emotional pop ballad built
      around warm expressive female vocals, soft piano, warm strings, subtle
      percussion, and atmospheric reverb. It glows with the feeling of a memory
      that refuses to fade — a single light left burning for someone who’s no
      longer there.</p>

      <p>The song follows a woman walking through the remnants of a love that
      still echoes in every corner. She keeps a small light burning, a symbolic
      glow for the moments the darkness couldn’t erase. Even though she knows
      the show is over, she can’t bring herself to dim the last reminder of what
      once filled the room. “Ghostlight” captures the beauty and ache of holding
      on to the last flicker of someone’s presence.</p>
    lyrics_html: |
      <p>[Intro]
      One light left on the stage…
      Still shining where you used to stand</p>
      <p>[Verse 1]
      I walk across these worn‑out floorboards,
      Feel the echo of your soul.
      Every word you ever whispered
      Still hangs heavy in the cold.
      I keep the bulb burning softly —
      It’s a promise I can’t shake.
      A little glow for all the moments
      That the darkness couldn’t take.</p>
      <p>[Pre‑Chorus]
      My mind knows you’re gone, but
      My heart still feels you waiting in the wings.</p>
      <p>[Chorus]
      You’re my ghostlight —
      The little flame I leave on when the world slips into night.
      A quiet glow that illuminates the space
      Where your memory still fills the place.
      I know you won’t be walking in,
      But I can’t let the darkness win.
      So I keep it burning bright…
      My ghostlight.</p>
      <p>[Verse 2]
      I’ve tried to close the curtains slowly,
      Tried to sweep this stage of you.
      But the dust keeps rising softly,
      Tracing all we couldn’t do.
      And though the seats are cold and empty,
      I replay the lines we wrote —
      Every laugh and every heartbreak
      Still rehearsed in every note.</p>
      <p>[Pre‑Chorus]
      I know the show is over,
      But I can’t dim what still remains.</p>
      <p>[Chorus]
      You’re my ghostlight —
      The little flame I leave on when the world slips into night.
      A quiet glow that illuminates the space
      Where your memory still fills this place.
      I know you won’t be walking in,
      But I can’t let the darkness win.
      So I keep it burning bright…
      My ghostlight.</p>
      <p>[Bridge]
      Maybe someday I’ll switch it off
      And let the shadows have their turn.
      Maybe someday I’ll walk away
      From all the things that still burn.
      But tonight I need the comfort
      Of the glow you left behind —
      A single light to guide me
      Through all the corners of my mind.</p>
      <p>[Final Chorus]
      You’re my ghostlight —
      Still shining brightly while I’m learning to be alright.
      A quiet flame that anchors this place
      Where I loved you more than time or space.
      I can feel you won’t be back again,
      But letting go takes strength I still don’t have
      So I’ll keep it burning bright…
      My ghostlight.</p>
      <p>[Outro]
      One light left on the stage…
      Waiting for the day I’m ready to let go.</p>
