    title: Vegas in the Sky (Country‑Pop Party Anthem) – Horizon Sound
    description_html: |-
      <p>“Vegas in the Sky” is an upbeat country‑pop party anthem that turns a routine flight into a full‑blown mid‑air celebration. Acoustic guitar, stomps, claps, and bright fiddle accents drive the track, while a swagger‑filled male vocal narrates the chaos unfolding at thirty thousand feet. From blackjack in the aisle to glitter‑covered passengers and a laughing flight crew, the song captures the wild, communal energy of a plane full of people pre‑gaming for the Strip.</p>
      <p>The story unfolds like a cinematic comedy: Elvis impersonators, bachelor parties, birthday girls, magic‑show superfans, and a grandma sipping her spritzer as the cabin erupts around her. With a big, catchy chorus and festival‑ready momentum, “Vegas in the Sky” celebrates the thrill of letting loose before the wheels even touch down.</p>
