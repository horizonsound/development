  - song_id: sheriff-for-a-night-50s-western-tall-tale-horizon-sound
    youtube_id: oMSIQ5Gv2ZI
    title: Sheriff for a Night (50s Western Tall‑Tale) – Horizon Sound
    description_html: |-
      <p>“Sheriff for a Night” is a playful, vintage‑inspired 1950s Western tune built on twangy guitars, upright bass, brushed drums, and a warm baritone vocal. Blending classic cowboy storytelling with a comedic tall‑tale twist, the track captures the dusty charm of old frontier towns and the accidental legends born in them. With its swinging rhythm, cinematic atmosphere, and nostalgic production, the song feels like a lost scene from a golden‑age Western film.</p>
      <p>This song tells the story of a drifter who rides into Red Rock City looking for nothing more than a warm meal and a place to rest — only to be thrown into chaos when the mayor slaps a sheriff’s star on him for one wild night. From breaking up bar fights to corralling drunks and staring down bandits, he somehow stumbles his way into saving the town. Now, every time he passes through, the locals cheer like he’s a hero… even though he swears he didn’t do a thing. “Sheriff for a Night” is a fun, cinematic tribute to the legends small towns love to tell.</p>
    vibes:
      - '🎧 Vibe: 1950s Western swing, warm, nostalgic, comedic'
      - '🎤 Vocals: smooth male baritone, classic phrasing, storytelling delivery'
      - '🎛️ Production: acoustic guitar, upright bass, brushed drums, vintage reverb'
