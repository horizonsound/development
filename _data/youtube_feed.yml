    description_html: |-
      <p>“Barefoot & Buzzed” is a warm, sun‑drenched coastal pop track built on breezy guitar strums, soft percussion, and a relaxed, late‑afternoon glow. The song captures that perfect moment when the day slows down, the tide rolls in, and everything feels easy — toes in the sand, drink in hand, and nowhere to be. Cody’s mellow vocals float over a gentle rhythm that feels like a slow walk along the shoreline, carrying the listener into a carefree, golden‑hour haze.</p>
