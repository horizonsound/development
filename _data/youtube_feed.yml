    youtube_id: BrZ1VWJ2lso
    title: 2. Borrowed Time – Performed by Lydia Ellington (After the Silence) | Horizon Sound
    description_html: |-
      <p>“Borrowed Time” is a tender, mid‑tempo emotional pop ballad shaped by warm expressive female vocals, soft piano, gentle strings, and a nostalgic cinematic glow. It carries a bittersweet rise, balancing tenderness with the ache of knowing something beautiful was never meant to last.</p>
      <p>The song tells the story of loving someone you always knew you couldn’t keep. Every moment felt temporary, every kiss a small miracle borrowed from a future where the ending was already written. She holds on anyway — choosing fleeting warmth over emptiness — even as she feels the distance growing. It’s a confession of loving in the shadows of inevitability, and cherishing the seconds that were never really hers.</p>
