    youtube_id: 2cv-H5tTygs
    title: Someday (Acoustic Pop Storytelling) – Horizon Sound
    description_html: |-
      <p>“Someday” is a warm, nostalgic acoustic‑pop track built on gentle guitars, soft drums, and bright female vocals. The production leans intimate and cinematic, capturing the innocence of two best friends dreaming of a future adventure they’re too young to understand. Light percussion and airy harmonies give the song a hopeful lift, while the storytelling stays grounded and heartfelt.</p>
      <p>This song follows two girls who make a promise — one day, they’ll see Venice together. Life is simple, the world feels big, and the dream feels even bigger. “Someday” captures the magic of childhood imagination, the kind of promise you whisper with absolute certainty, not knowing how long life will take to fulfill it. It’s the beginning of a lifelong story, the first chapter of a dream that waits patiently for decades.</p>
