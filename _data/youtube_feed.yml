    youtube_id: vlB58WPvjns
    title: Total Eclipse - Years Later (80s Piano Power Ballad) - Horizon Sound
    description_html: |-
      <p>“Total Eclipse - Years Later” is paying tribute to the story in a Total Eclipse of the Heart. It tries to imagine where she might be years later. It is a piano‑driven, 80s‑inspired ballad with soft, intimate verses and a gradual emotional build. The piano stays at the center while warm strings and gated‑reverb drums rise in slowly, creating a nostalgic, cinematic atmosphere. The vocal is a strong but controlled female rock performance — expressive, warm, and raspy without shouting.</p>
      <p>The song tells the story of someone reclaiming their strength after a painful past, stepping out of old shadows and into their own light. With its reflective verses, powerful choruses, and the recurring phrase “turn around” delivered in a soft‑to‑strong dynamic, the track captures the moment of finally seeing yourself clearly and choosing a new path forward.</p>
