  - song_id: already-out-the-door-modern-country-horizon-sound
    youtube_id: EfXB-Yv_XSY
    title: Already Out the Door (Modern Country) - Horizon Sound
    description_html: |-
      <p>“Already Out the Door” is a modern country heartbreak story built on warm acoustic guitars, steady mid‑tempo drums, and clean Nashville‑style electric fills. An emotional male lead vocal carries the song with sincerity and restraint, avoiding exaggerated twang while leaning into a wounded, reflective tone. Smooth harmonies bloom only in the chorus, adding lift without overshadowing the intimacy of the verses. The production is polished, spacious, and subtly atmospheric, letting the storytelling take center stage.</p>
      <p>This song captures the quiet devastation of realizing trust is gone — the late‑night waiting, the phone location that tells the truth, and the moment a relationship breaks without a single raised voice. Honest, grounded, and deeply human, “Already Out the Door” is a modern country confession for anyone who’s stayed too long, hoped too hard, and finally walked away with nothing left to give.</p>
    vibes:
      - '🎧 Vibe: modern country, mid‑tempo, emotional, reflective'
      - '🎤 Vocals: sincere male lead, warm tone, soft harmonies in the chorus'
      - '🎛️ Production: acoustic‑driven, subtle electric fills, clean Nashville mix'
