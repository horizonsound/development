    description_html: |-
      <p>“The Way We Lied” is a slow, aching emotional pop ballad shaped by warm expressive female vocals, soft piano, warm strings, and spacious reverb. It captures the heavy truth of a love that faded long before either person was willing to admit it — a relationship held together by hope, denial, and silence.</p>
      <p>The song follows two people pretending they’re still okay, painting over cracks, brushing aside tears, and calling heartbreak “just a bruise.” The real truth sits in the quiet moments — the distance at the table, the promises neither of them believes anymore. It’s a confession of the ways we cling to something already slipping away, and the pain of finally facing what’s been true all along.</p>
