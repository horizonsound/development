<script>
document.addEventListener("DOMContentLoaded", () => {

  function bindInternalLinks(scope = document) {
    scope.querySelectorAll("a").forEach(link => {
      console.log("SPA CHECK:", link, "href:", link.getAttribute("href"));

      if (link.dataset.spaBound === "true") return;

      const href = link.getAttribute("href");
      if (!href) return;

      if (href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (href.startsWith("#")) return;

      const url = new URL(link.href);
      if (url.origin !== window.location.origin) {
        console.log("SPA SKIP (external):", link.href);
        return;
      }

      console.log("SPA BIND:", link.href);
      link.dataset.spaBound = "true";

      link.addEventListener("click", async (e) => {
        e.preventDefault();

        const response = await fetch(url, { credentials: "same-origin" });
        const html = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const newMain = doc.querySelector("main");

        const oldMain = document.querySelector("main");
        oldMain.replaceWith(newMain);
        history.pushState({}, "", url);

        // --- SAFE SCRIPT RE-EXECUTION ---
        const scripts = newMain.querySelectorAll("script");
        scripts.forEach(oldScript => {

          // Skip external scripts (YouTube API, etc.)
          if (oldScript.src) return;

          const code = oldScript.textContent;

          // Skip catalog scripts (avoid running on playlist page)
          if (code.includes("initCatalogPage")) return;

          // Skip scripts that declare global variables (avoid duplicate variable errors)
          if (code.includes("let params") ||
              code.includes("let YT_READY") ||
              code.includes("var params") ||
              code.includes("var YT_READY")) return;

          // Only re-run safe inline scripts (playlist init, etc.)
          const s = document.createElement("script");
          s.textContent = code;
          document.body.appendChild(s);
        });
        // --- END SAFE SCRIPT RE-EXECUTION ---

        // Re-bind links globally
        bindInternalLinks(document);

        // Re-run page initializers if present
        if (typeof initCatalogPage === "function") initCatalogPage();
        if (typeof onYouTubeIframeAPIReady === "function") onYouTubeIframeAPIReady();
      });
    });
  }

  // Initial bind
  bindInternalLinks(document);
});
</script>
