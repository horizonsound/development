---
layout: default
permalink: /artists/:slug.html
---

<style>
  .artist-hero {
    width: 100%;
    height: 60vh;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  
  .artist-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.75));
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 4rem 8vw;
  }
  
  .artist-name {
    font-size: 4rem;
    font-weight: 800;
    color: white;
    margin: 0;
  }
  
  .artist-tagline {
    font-size: 1.5rem;
    color: rgba(255,255,255,0.85);
    margin-top: 1rem;
  }

  .artist-bio {
    padding: 3rem 8vw;
    max-width: 800px;
  }

  .artist-photo-wall {
    padding: 3rem 8vw;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
  }
  
  .artist-photo-wall .photo {
    aspect-ratio: 1 / 1;
    background-size: cover;
    background-position: center;
    border-radius: 12px;
  }

</style>

{% assign artist = site.data.artists.artists | where: "slug", page.slug | first %}

{% if artist %}
  {% include artist-page.html artist=artist %}
{% else %}
  <p>Artist not found.</p>
{% endif %}
